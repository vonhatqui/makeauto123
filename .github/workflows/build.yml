name: Build Vncheat Dylib
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos & Vendor
        run: |
          export THEOS=$HOME/theos
          rm -rf $THEOS
          git clone --depth 1 https://github.com/theos/theos.git $THEOS
          cd $THEOS
          git submodule update --init --recursive
          ./bin/update-theos
          # Tải thêm file header/lib cho Substrate
          curl -L https://github.com/theos/headers/archive/master.tar.gz | tar -xz -C $THEOS/include --strip-components=1
          brew install ldid
          
      - name: Setup SDK (Clean)
        run: |
          export THEOS=$HOME/theos
          rm -rf $THEOS/sdks
          git clone --depth 1 https://github.com/theos/sdks.git $THEOS/sdks

      - name: Fix Missing dm.pl
        run: |
          curl -LO https://raw.githubusercontent.com/theos/theos/master/bin/dm.pl
          mv dm.pl $HOME/theos/bin/
          chmod +x $HOME/theos/bin/dm.pl

      - name: Compile Vncheat Dylib
        run: |
          export THEOS=$HOME/theos
          cd template
          SDK_PATH=$(find $THEOS/sdks -name "iPhoneOS*.sdk" -type d | head -n 1)
          # Thêm cờ để ép nhận thư viện substrate
          make package FINALPACKAGE=1 SYSROOT=$SDK_PATH
          
      - name: Upload Vncheat Product
        uses: actions/upload-artifact@v4
        with:
          name: Vncheat-Dylib-Package
          path: template/packages/*.deb







