name: Build Vncheat Dylib
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4 # Cập nhật lên v4 luôn cho đồng bộ
        with:
          submodules: recursive

      - name: Setup Theos
        run: |
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
      - name: Setup SDK
        run: |
          export THEOS=$HOME/theos
          git clone https://github.com/theos/sdks.git $THEOS/sdks
          
      - name: Compile Vncheat Dylib
        run: |
          export THEOS=$HOME/theos
          make package FINALPACKAGE=1
          
      - name: Upload Vncheat Product
        uses: actions/upload-artifact@v4 # <<< ĐỔI THÀNH V4 Ở ĐÂY LÀ HẾT LỖI
        with:
          name: Vncheat-Dylib-Package
          path: packages/*.deb
