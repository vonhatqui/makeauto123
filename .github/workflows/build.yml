name: Build Vncheat Dylib
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos & Vendor
        run: |
          export THEOS=$HOME/theos
          git clone --depth 1 https://github.com/theos/theos.git $THEOS
          cd $THEOS
          git submodule update --init --recursive
          ./bin/update-theos
          brew install ldid
          
      - name: Setup SDK 16.5 (Bản chuẩn)
        run: |
          export THEOS=$HOME/theos
          mkdir -p $THEOS/sdks
          # Tải SDK 16.5 để fix lỗi IOSurface
          curl -LO https://github.com/Theos-Archive/sdks/raw/master/iPhoneOS16.5.sdk.tar.xz
          tar -xf iPhoneOS16.5.sdk.tar.xz -C $THEOS/sdks
          rm iPhoneOS16.5.sdk.tar.xz

      - name: Fix Missing dm.pl
        run: |
          curl -LO https://raw.githubusercontent.com/theos/theos/master/bin/dm.pl
          mv dm.pl $HOME/theos/bin/
          chmod +x $HOME/theos/bin/dm.pl

      - name: Compile Vncheat Dylib
        run: |
          export THEOS=$HOME/theos
          cd template
          # Chỉ định đích danh SDK 16.5 để máy ảo không dùng nhầm SDK 10.3 hay 18.5
          make package FINALPACKAGE=1 SYSROOT=$THEOS/sdks/iPhoneOS16.5.sdk
          
      - name: Upload Vncheat Product
        uses: actions/upload-artifact@v4
        with:
          name: Vncheat-Dylib-Package
          path: template/packages/*.deb




