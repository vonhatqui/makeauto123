name: Build Vncheat Dylib
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Theos
        run: |
          export THEOS=$HOME/theos
          git clone --depth 1 https://github.com/theos/theos.git $THEOS
          
      - name: Setup SDK
        run: |
          export THEOS=$HOME/theos
          mkdir -p $THEOS/sdks
          curl -LO https://github.com/theos/sdks/archive/master.tar.gz
          tar -xf master.tar.gz -C $THEOS/sdks --strip-components=1
          
      - name: Compile Vncheat Dylib
        run: |
          export THEOS=$HOME/theos
          # --- ĐOẠN QUAN TRỌNG NHẤT ---
          # Thay 'template' bằng tên folder chứa file Makefile
          # Nếu file Makefile nằm ngay ở ngoài (không nằm trong folder nào) thì XÓA dòng cd này đi
          cd template 
          # ----------------------------
          make package FINALPACKAGE=1
          
      - name: Upload Vncheat Product
        uses: actions/upload-artifact@v4
        with:
          name: Vncheat-Dylib-Package
          # Nếu có dùng lệnh cd ở trên, thì đường dẫn path ở dưới cũng phải khớp
          path: TEN_THU_MUC_CUA_BAN/packages/*.deb


