name: Build iOS Tweak Fixed

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Depoyu Çek (Checkout)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Theos'u Manuel İndir (Hatasız Yöntem)
        run: |
          # Otomatik script yerine direkt depoyu kopyalıyoruz
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "THEOS_MAKE_PATH=$HOME/theos/makefiles" >> $GITHUB_ENV

      - name: SDK İndir (iOS 14.5)
        run: |
          # SDK'yı da elle indiriyoruz
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip master.zip
          mkdir -p $HOME/theos/sdks
          mv sdks-master/iPhoneOS14.5.sdk $HOME/theos/sdks/
          rm -r sdks-master master.zip

      - name: Derle (Make Package)
        run: |
          export THEOS=$HOME/theos
          make package FINALPACKAGE=1
          
      - name: Dosyayı Yükle (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: CriticalCheats_Dylib
          path: packages/*.deb
